name: Build and Push Docker Image

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - '.gitignore'

env:
  IMAGE_NAME: gaoxiang-knowledge-map

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        run: |
          # 获取短的 commit hash
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          
          echo "Building image for ${IMAGE_NAME}:${SHORT_SHA}"
          
          # 构建镜像
          docker build -t ${{ secrets.DOCKER_USERNAME }}/${IMAGE_NAME}:${SHORT_SHA} -t ${{ secrets.DOCKER_USERNAME }}/${IMAGE_NAME}:latest .
          
          # 推送镜像
          docker push ${{ secrets.DOCKER_USERNAME }}/${IMAGE_NAME}:${SHORT_SHA}
          docker push ${{ secrets.DOCKER_USERNAME }}/${IMAGE_NAME}:latest
          
          echo "Successfully pushed ${IMAGE_NAME}:${SHORT_SHA} and latest"
