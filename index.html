<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高项知识图谱</title>
    <style>
        :root {
            --sidebar-width: 300px;
            --bg-color: #f8fafc;
            --sidebar-bg: #ffffff;
            --text-color: #1e293b;
            --border-color: #e2e8f0;
            --hover-bg: #f1f5f9;
            --active-bg: #eff6ff;
            --active-text: #2563eb;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            display: flex;
            height: 100vh;
            background-color: var(--bg-color);
            overflow: hidden;
        }

        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
            position: relative;
            z-index: 10;
        }

        .sidebar.collapsed {
            width: 0;
            border-right: none;
        }

        .sidebar.collapsed .sidebar-header,
        .sidebar.collapsed .nav-list {
            display: none;
        }

        .toggle-btn {
            position: absolute;
            right: -40px;
            top: 20px;
            width: 32px;
            height: 32px;
            background: white;
            border: 1px solid var(--border-color);
            border-left: none;
            border-radius: 0 6px 6px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 100;
            color: #64748b;
            box-shadow: 2px 0 5px rgba(0, 0, 0, 0.05);
        }

        .toggle-btn:hover {
            color: var(--active-text);
            background: var(--hover-bg);
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .sidebar-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-color);
            margin-bottom: 16px;
        }

        .search-box {
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            outline: none;
            font-size: 0.875rem;
            transition: all 0.2s;
        }

        .search-input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.1);
        }

        .nav-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        .nav-item {
            display: block;
            padding: 10px 12px;
            margin-bottom: 4px;
            text-decoration: none;
            color: #64748b;
            border-radius: 6px;
            font-size: 0.9rem;
            transition: all 0.2s;
            cursor: pointer;
        }

        .nav-item:hover {
            background-color: var(--hover-bg);
            color: var(--text-color);
        }

        .nav-item.active {
            background-color: var(--active-bg);
            color: var(--active-text);
            font-weight: 500;
        }

        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: white;
        }

        /* Custom Scrollbar */
        .nav-list::-webkit-scrollbar {
            width: 6px;
        }

        .nav-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .nav-list::-webkit-scrollbar-thumb {
            background-color: #d1d5db;
            border-radius: 3px;
        }

        .nav-list::-webkit-scrollbar-thumb:hover {
            background-color: #9ca3af;
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .sidebar {
                position: absolute;
                left: -100%;
                z-index: 50;
                height: 100%;
                box-shadow: 2px 0 8px rgba(0, 0, 0, 0.1);
            }

            .sidebar.open {
                transform: translateX(100%);
            }
        }
    </style>
</head>

<body>
    <div class="sidebar" id="sidebar">
        <div class="toggle-btn" id="toggle-btn" title="切换侧边栏">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
        </div>
        <div class="sidebar-header">
            <h1 class="sidebar-title">高项知识图谱</h1>
            <div class="search-box">
                <input type="text" class="search-input" placeholder="搜索章节..." id="search-input">
            </div>
        </div>
        <div class="nav-list" id="nav-list">
            <!-- Navigation items will be inserted here -->
        </div>
    </div>
    <div class="content">
        <iframe name="content-frame" id="content-frame"></iframe>
    </div>

    <script>
        const files = [
            "第1章 信息化发展.html",
            "第2章 信息技术发展.html",
            "第3章 信息系统治理.html",
            "第4章 信息系统管理.html",
            "第5章 信息系统工程.html",
            "第6章 项目管理概论.html",
            "第7章 项目立项管理.html",
            "第8章 项目整合管理.html",
            "第9章 项目范围管理.html",
            "第10章 项目进度管理.html",
            "第11章 项目成本管理.html",
            "第12章 项目质量管理.html",
            "第13章 项目资源管理.html",
            "第14章 项目沟通管理.html",
            "第15章 项目风险管理.html",
            "第16章 项目采购管理.html",
            "第17章 项目干系人管理.html",
            "第18章 项目绩效域.html",
            "第19章 配置与变更管理.html",
            "第20章 高级项目管理.html",
            "第22章 组织通用治理.html",
            "第23章 组织通用管理.html",
            "第24章 法律法规与标准规范.html"
        ];

        const navList = document.getElementById('nav-list');
        const searchInput = document.getElementById('search-input');
        const iframe = document.getElementById('content-frame');
        const sidebar = document.getElementById('sidebar');
        const toggleBtn = document.getElementById('toggle-btn');

        // Toggle Sidebar
        toggleBtn.addEventListener('click', () => {
            sidebar.classList.toggle('collapsed');

            // Update icon
            if (sidebar.classList.contains('collapsed')) {
                toggleBtn.innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                        <polyline points="12 5 19 12 12 19"></polyline>
                    </svg>
                `;
            } else {
                toggleBtn.innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="19" y1="12" x2="5" y2="12"></line>
                        <polyline points="12 19 5 12 12 5"></polyline>
                    </svg>
                `;
            }
        });

        // Initial render
        renderNavList(files);

        // Load first item by default
        if (files.length > 0) {
            loadContent(files[0]);
        }

        // Search functionality
        searchInput.addEventListener('input', (e) => {
            const keyword = e.target.value.toLowerCase();
            const filteredFiles = files.filter(file =>
                file.toLowerCase().includes(keyword)
            );
            renderNavList(filteredFiles);
        });

        function renderNavList(fileList) {
            navList.innerHTML = '';

            if (fileList.length === 0) {
                const emptyMsg = document.createElement('div');
                emptyMsg.style.padding = '20px';
                emptyMsg.style.textAlign = 'center';
                emptyMsg.style.color = '#94a3b8';
                emptyMsg.textContent = '未找到相关章节';
                navList.appendChild(emptyMsg);
                return;
            }

            fileList.forEach(file => {
                const a = document.createElement('div');
                a.className = 'nav-item';
                a.textContent = file.replace('.html', '');

                // Check if active
                if (iframe.src.endsWith(encodeURIComponent(file))) {
                    a.classList.add('active');
                }

                a.onclick = () => loadContent(file);
                navList.appendChild(a);
            });
        }

        function loadContent(file) {
            // Update iframe
            iframe.src = `htmls/${file}`;

            // Update active state in UI
            const allLinks = document.querySelectorAll('.nav-item');
            allLinks.forEach(link => {
                if (link.textContent === file.replace('.html', '')) {
                    link.classList.add('active');
                } else {
                    link.classList.remove('active');
                }
            });
        }
    </script>
</body>

</html>
